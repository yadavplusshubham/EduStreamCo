version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: edustream-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - edustream-net

  backend:
    build: ./backend
    container_name: edustream-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      - MONGO_URL=mongodb://mongo:27017
    depends_on:
      - mongo
    networks:
      - edustream-net

  frontend:
    build:
      context: ./frontend-next
      args:
        - NEXT_PUBLIC_BACKEND_URL=https://edustream.co.in
    container_name: edustream-frontend
    restart: unless-stopped
    ports:
      - "3010:3000"
    depends_on:
      - backend
    networks:
      - edustream-net

  backend-proxy:
    image: nginx:alpine
    container_name: edustream-api-proxy
    restart: unless-stopped
    ports:
      - "8011:80"
    volumes:
      - ./nginx/api-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - edustream-net

volumes:
  mongo_data:

networks:
  edustream-net:
    driver: bridge
