# Drop this file into your existing Nginx config directory
# (e.g. /etc/nginx/sites-available/ or Nginx Proxy Manager custom config)
# Then: nginx -t && nginx -s reload

server {
    listen 80;
    server_name edustream.co.in www.edustream.co.in;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name edustream.co.in www.edustream.co.in;

    ssl_certificate     /etc/letsencrypt/live/edustream.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edustream.co.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API → backend container
    location /api/ {
        proxy_pass http://127.0.0.1:8011/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Everything else → Next.js frontend container
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
